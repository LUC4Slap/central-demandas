services:
  mysql:
    image: mysql:8
    container_name: central-demandas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: central_demandas
      MYSQL_USER: demandas
      MYSQL_PASSWORD: demandaspass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: node:20-alpine
    container_name: central-demandas-app
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev -- -H 0.0.0.0"
    ports:
      - "9000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://demandas:demandaspass@mysql:3306/central_demandas?allowPublicKeyRetrieval=true
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
